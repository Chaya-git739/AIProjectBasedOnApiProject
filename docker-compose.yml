version: '3.8'

services:
  apigateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "5005:8080"
    depends_on:
      - authenticationservice
      - orderservice
      - catalogservice
      - catalogservice2
      - notificationservice

  webapi:
    build: 
      context: ./WebApplication2
      dockerfile: Dockerfile
    depends_on:
      - sqlserver
      - redis
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=MyStoreDatabase;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
      - Redis__Connection=redis:6379

  authenticationservice:
    build:
      context: .
      dockerfile: AuthenticationService/Dockerfile
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=AuthDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=RaffleSystemAPI
      - Jwt__Audience=RaffleSystemClient

  orderservice:
    build:
      context: .
      dockerfile: OrderService/Dockerfile
    depends_on:
      - sqlserver
      - notificationservice
    environment:
      - ConnectionStrings__OrderConnection=Server=sqlserver;Database=OrdersDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
      - Services__NotificationService=http://notificationservice:80
      - Services__CatalogService=http://catalogservice:80
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=RaffleSystemAPI
      - Jwt__Audience=RaffleSystemClient

  catalogservice:
    build:
      context: .
      dockerfile: CatalogService/Dockerfile
    depends_on:
      - mongo
    environment:
      - ConnectionStrings__CatalogMongo=mongodb://mongo:27017
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=RaffleSystemAPI
      - Jwt__Audience=RaffleSystemClient

  catalogservice2:
    build:
      context: .
      dockerfile: CatalogService/Dockerfile
    depends_on:
      - mongo
    environment:
      - ConnectionStrings__CatalogMongo=mongodb://mongo:27017
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=RaffleSystemAPI
      - Jwt__Audience=RaffleSystemClient

  notificationservice:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    depends_on:
      - redis
    environment:
      - Redis__Connection=redis:6379
      - EmailSettings__SmtpServer=smtp.gmail.com
      - EmailSettings__SmtpPort=587
      - EmailSettings__SenderEmail=${EMAIL_SENDER_ADDRESS}
      - EmailSettings__SenderPassword=${EMAIL_SENDER_PASSWORD}
      - EmailSettings__SenderName=מערכת ההגרלות

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrongPassword123!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5