version: '3.8'

services:
  webapi:
    build: 
      context: ./WebApplication2
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver
      - redis
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=MyStoreDatabase;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
      - Redis__Connection=redis:6379

  authenticationservice:
    build:
      context: ./AuthenticationService
      dockerfile: Dockerfile
    ports:
      - "5001:80"
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=AuthDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=RaffleSystemAPI
      - Jwt__Audience=RaffleSystemClient

  orderservice:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    ports:
      - "5002:80"
    depends_on:
      - sqlserver
      - notificationservice
    environment:
      - ConnectionStrings__OrderConnection=Server=sqlserver;Database=OrdersDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
      - Services__NotificationService=http://notificationservice:80
      - Services__CatalogService=http://catalogservice:80
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=RaffleSystemAPI
      - Jwt__Audience=RaffleSystemClient

  catalogservice:
    build:
      context: ./CatalogService
      dockerfile: Dockerfile
    ports:
      - "5003:80"
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__CatalogConnection=Server=sqlserver;Database=CatalogDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=RaffleSystemAPI
      - Jwt__Audience=RaffleSystemClient

  notificationservice:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    ports:
      - "5004:80"
    depends_on:
      - redis
    environment:
      - Redis__Connection=redis:6379
      - EmailSettings__SmtpServer=smtp.gmail.com
      - EmailSettings__SmtpPort=587
      - EmailSettings__SenderEmail=${EMAIL_SENDER_ADDRESS}
      - EmailSettings__SenderPassword=${EMAIL_SENDER_PASSWORD}
      - EmailSettings__SenderName=מערכת ההגרלות

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrongPassword123!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5